<!doctype html>
<html lang="ar" dir="rtl"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>تحرير المعرض | فارس محمود</title>
<style>
:root{--blue:#53a8ff;--violet:#8b68ff;--cyan:#6ee7ff;--muted:#a8b2cc;--line:rgba(255,255,255,.12)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Cairo,system-ui,sans-serif;background:linear-gradient(180deg,#070b14,#0b1120 50%,#070b14);color:#fff;padding:20px}
.wrap{width:min(1200px,calc(100% - 40px));margin:auto}
h1{font-size:32px;margin-bottom:24px;background:linear-gradient(135deg,var(--cyan),var(--blue),var(--violet));-webkit-background-clip:text;background-clip:text;color:transparent}
.section{margin:30px 0;padding:20px;border:1px solid var(--line);border-radius:12px;background:rgba(255,255,255,.04)}
.section h2{font-size:18px;margin-bottom:15px;color:#fff}
label{display:block;margin:12px 0 6px;color:var(--muted);font-size:14px}
input,select,textarea{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:8px;background:rgba(255,255,255,.08);color:#fff;font-family:inherit;margin-bottom:12px}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue);background:rgba(83,168,255,.1)}
button{padding:12px 24px;border:0;border-radius:8px;background:linear-gradient(135deg,var(--blue),var(--violet));color:#fff;font-weight:900;cursor:pointer;margin:6px 6px 6px 0}
button:hover{opacity:.85}
button.danger{background:#e74c3c}
.work-item{padding:15px;border:1px solid var(--line);border-radius:8px;margin-bottom:10px;background:rgba(255,255,255,.04);display:flex;gap:15px;align-items:center;justify-content:space-between}
.work-thumb{width:60px;height:60px;border-radius:8px;background:#0d1425;overflow:hidden;cursor:pointer;flex-shrink:0}
.work-thumb img{width:100%;height:100%;object-fit:cover}
.work-info{flex:1;min-width:0;padding:0 10px}
.work-info p{color:var(--muted);font-size:12px;margin:4px 0;overflow:hidden;text-overflow:ellipsis}
.work-actions{display:flex;gap:4px;flex-shrink:0}
.work-actions button{margin:0;padding:6px 10px;font-size:12px}
table{width:100%;border-collapse:collapse;margin-top:12px}
table th{border-bottom:2px solid var(--line);padding:12px;text-align:right;font-weight:900;color:var(--cyan)}
table td{border-bottom:1px solid var(--line);padding:12px;font-size:12px}
table button{margin:0;padding:4px 8px;font-size:11px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-top:12px}
.stat-box{padding:15px;border-radius:8px;background:rgba(83,168,255,.1);border:1px solid rgba(83,168,255,.25);text-align:center}
.stat-box .value{font-size:24px;font-weight:900;color:var(--cyan)}
.stat-box .label{font-size:12px;color:var(--muted);margin-top:6px}
.preview{margin-top:20px;padding:20px;border-radius:12px;background:rgba(255,255,255,.04);border:1px solid var(--line)}
.preview img{max-width:100%;max-height:400px;border-radius:8px;margin-top:10px}
.alert{padding:12px;border-radius:8px;margin:12px 0;background:rgba(231,76,60,.2);border:1px solid rgba(231,76,60,.5);color:#ff9999}
</style></head><body>
<div class="wrap">
<h1>⚙️ تحرير المعرض (خاص بك فقط)</h1>
<p style="color:var(--muted);margin-bottom:20px">هذه الصفحة خاصة بتعديل البيانات والترتيب. استخدم الأزرار ⬆️ و ⬇️ لإعادة ترتيب الصور.</p>

<div id="alertBox"></div>

<div class="section">
<h2>إحصائيات سريعة</h2>
<div class="stats" id="stats"></div>
</div>

<div class="section">
<h2>إدارة الأقسام والعمال</h2>
<label>اختر قسم:</label>
<select id="catSelect" style="margin-bottom:15px">
<option value="all">كل الأعمال</option>
</select>
<button id="toggleBtn" style="margin-bottom:15px">✅ وضع التحرير: مفعل</button>
<button onclick="app.downloadData()">⬇️ تحميل البيانات</button>
<button onclick="document.getElementById('uploadFile').click()">⬆️ رفع بيانات</button>
<input type="file" id="uploadFile" style="display:none" accept=".json" onchange="app.uploadData(this)">
<button onclick="document.getElementById('imageFile').click()">➕ إضافة صور جديدة</button>
<input type="file" id="imageFile" style="display:none" accept="image/*" multiple onchange="app.addImages(this)">
<button onclick="app.resetToDefault()" class="danger">🔄 استعادة الافتراضي</button>
<div id="workList" style="margin-top:20px"></div>
</div>

<div class="section">
<h2>عرض مرئي للبيانات</h2>
<table id="dataTable"><thead><tr><th>الصورة</th><th>الملف</th><th>الفئة</th><th>التقييم</th></tr></thead><tbody id="tableBody"></tbody></table>
</div>

<div class="section preview" id="previewSection" style="display:none">
<h2>معاينة الصورة</h2>
<img id="previewImg" src="" alt="">
</div>

</div>

<script src="portfolio-data.js?v=54"></script>
<script>
const app={
  editMode:true,
  catSelect:null,
  workList:null,
  tableBody:null,
  statsBox:null,
  alertBox:null,
  toggleBtn:null,

  init(){
    this.catSelect=document.getElementById('catSelect');
    this.workList=document.getElementById('workList');
    this.tableBody=document.getElementById('tableBody');
    this.statsBox=document.getElementById('stats');
    this.alertBox=document.getElementById('alertBox');
    this.toggleBtn=document.getElementById('toggleBtn');
    
    if(!window.portfolioCategories){
      this.alert('⚠️ خطأ: لم يتم تحميل البيانات');
      console.error('portfolioCategories not loaded');
      return;
    }
    
    // تحديث الأقسام
    window.portfolioCategories.forEach(cat=>{
      if(cat.id!=='all')this.catSelect.innerHTML+=`<option value="${cat.id}">${cat.label}</option>`
    });
    
    // ربط الأحداث
    this.catSelect.addEventListener('change',()=>this.render());
    this.toggleBtn.addEventListener('click',()=>this.toggleEditMode());
    
    this.render();
    this.updateToggleBtn();
  },

  alert(msg){
    const el=document.createElement('div');
    el.className='alert';
    el.textContent=msg;
    this.alertBox.appendChild(el);
    setTimeout(()=>el.remove(),3000);
  },

  updateToggleBtn(){
    this.toggleBtn.textContent=this.editMode?'✅ وضع التحرير: مفعل':'❌ وضع التحرير: مطفأ';
  },

  render(){
    const cat=this.catSelect.value;
    const works=window.getPortfolioWorksForCategory?window.getPortfolioWorksForCategory(cat):
      (cat==='all'?window.portfolioWorks:window.portfolioWorks.filter(w=>w.cat===cat));
    
    console.log(`render() القسم: "${cat}" عدد الأعمال:`,works?.length||0);
    
    this.workList.innerHTML='';
    if(!works||works.length===0){
      this.workList.innerHTML='<p style="color:#a8b2cc;padding:20px;text-align:center">لا توجد أعمال في هذا القسم</p>';
      return;
    }
    
    works.forEach((w,idx)=>{
      const el=document.createElement('div');
      el.className='work-item';
      const fileName=w.src.split('/').pop();
      let actionButtons='';
      if(this.editMode){
        if(idx>0)actionButtons+=`<button onclick="app.moveUp('${cat}',${idx})">⬆️</button>`;
        if(idx<works.length-1)actionButtons+=`<button onclick="app.moveDown('${cat}',${idx})">⬇️</button>`;
        actionButtons+=`<button onclick="app.deleteWork('${cat}','${w.src}')" class="danger">❌</button>`;
      }
      el.innerHTML=`
        <div class="work-thumb" onclick="app.preview('${w.src}')"><img src="${w.src}" alt=""></div>
        <div class="work-info">
          <p><b>${fileName}</b></p>
          <p>الفئة: ${w.cat} | التقييم: ${w.rating}</p>
        </div>
        <div class="work-actions">${actionButtons}</div>
      `;
      this.workList.appendChild(el);
    });
    
    this.updateTable();
    this.updateStats();
  },

  updateStats(){
    const stats=[
      {label:'إجمالي الأعمال',value:window.portfolioWorks.length},
      {label:'الفئات',value:window.portfolioCategories.length-1}
    ];
    const cats={};
    window.portfolioWorks.forEach(w=>{cats[w.cat]=(cats[w.cat]||0)+1});
    
    this.statsBox.innerHTML=stats.map(s=>`<div class="stat-box"><div class="value">${s.value}</div><div class="label">${s.label}</div></div>`).join('');
    Object.entries(cats).forEach(([cat,count])=>{
      const label=window.portfolioCategories.find(c=>c.id===cat)?.label||cat;
      this.statsBox.innerHTML+=`<div class="stat-box"><div class="value">${count}</div><div class="label">${label}</div></div>`;
    });
  },

  updateTable(){
    const cat=this.catSelect.value;
    const works=window.getPortfolioWorksForCategory?window.getPortfolioWorksForCategory(cat):
      (cat==='all'?window.portfolioWorks:window.portfolioWorks.filter(w=>w.cat===cat));
    
    this.tableBody.innerHTML=works.map((w,idx)=>`
      <tr>
        <td><img src="${w.src}" alt="" style="width:30px;height:30px;border-radius:4px"></td>
        <td>${w.src.split('/').pop()}</td>
        <td>${w.cat}</td>
        <td>${w.rating}</td>
      </tr>
    `).join('');
  },

  preview(src){
    document.getElementById('previewImg').src=src;
    document.getElementById('previewSection').style.display='block';
    document.getElementById('previewSection').scrollIntoView({behavior:'smooth'});
  },

  toggleEditMode(){
    this.editMode=!this.editMode;
    this.updateToggleBtn();
    this.alert(this.editMode?'✅ وضع التحرير مفعل':'❌ وضع التحرير مطفأ');
    this.render();
  },

  moveUp(cat,idx){
    console.log('⬆️ moveUp() القسم:',cat,'الفهرس:',idx);
    if(idx===0){this.alert('⚠️ هذا هو العنصر الأول');return;}
    const works=window.getPortfolioWorksForCategory?window.getPortfolioWorksForCategory(cat):
      (cat==='all'?window.portfolioWorks:window.portfolioWorks.filter(w=>w.cat===cat));
    const arr=[...works];
    [arr[idx-1],arr[idx]]=[arr[idx],arr[idx-1]];
    this.saveOrder(cat,arr);
    this.alert('✅ تم تحديث الترتيب');
    this.render();
  },

  moveDown(cat,idx){
    console.log('⬇️ moveDown() القسم:',cat,'الفهرس:',idx);
    const works=window.getPortfolioWorksForCategory?window.getPortfolioWorksForCategory(cat):
      (cat==='all'?window.portfolioWorks:window.portfolioWorks.filter(w=>w.cat===cat));
    if(idx>=works.length-1){this.alert('⚠️ هذا هو العنصر الأخير');return;}
    const arr=[...works];
    [arr[idx],arr[idx+1]]=[arr[idx+1],arr[idx]];
    this.saveOrder(cat,arr);
    this.alert('✅ تم تحديث الترتيب');
    this.render();
  },

  saveOrder(cat,arr){
    if(window.reorderPortfolioWorks){
      if(cat==='all'){
        const srcs=arr.map(w=>w.src);
        console.log('💾 حفظ جميع الأعمال:',srcs.length,'عمل');
        localStorage.setItem('fares-portfolio-all-order-v1',JSON.stringify(srcs));
        console.log('✅ تم الحفظ في localStorage');
      }else{
        console.log('💾 حفظ القسم:',cat);
        window.reorderPortfolioWorks(cat,arr.map(w=>w.src));
      }
    }
  },

  deleteWork(cat,src){
    if(!confirm('هل أنت متأكد من حذف هذا العمل؟'))return;
    if(window.removePortfolioWork)window.removePortfolioWork(cat,src);
    this.alert('✅ تم حذف العمل');
    this.render();
  },

  downloadData(){
    const data={
      categories:window.portfolioCategories,
      works:window.portfolioWorks,
      customOrders:JSON.parse(localStorage.getItem('fares-portfolio-manual-orders-v1')||'{}'),
      allOrder:JSON.parse(localStorage.getItem('fares-portfolio-all-order-v1')||'[]')
    };
    const el=document.createElement('a');
    el.href=`data:application/json;charset=utf-8,${encodeURIComponent(JSON.stringify(data,null,2))}`;
    el.download=`portfolio-backup-${new Date().toISOString().split('T')[0]}.json`;
    el.click();
    this.alert('✅ تم تحميل البيانات');
  },

  uploadData(input){
    if(!input.files[0])return;
    const reader=new FileReader();
    reader.onload=(e)=>{
      try{
        const data=JSON.parse(e.target.result);
        if(data.customOrders)localStorage.setItem('fares-portfolio-manual-orders-v1',JSON.stringify(data.customOrders));
        if(data.allOrder)localStorage.setItem('fares-portfolio-all-order-v1',JSON.stringify(data.allOrder));
        this.alert('✅ تم رفع البيانات بنجاح');
        location.reload();
      }catch(err){this.alert('❌ خطأ: '+err.message)}
    };
    reader.readAsText(input.files[0]);
  },

  async addImages(input){
    if(!input.files||input.files.length===0)return;
    const cat=prompt('أدخل اسم القسم باللاتيني (مثل: restaurants, products):');
    if(!cat)return;
    const rating=prompt('التقييم الافتراضي (1-10):','5');
    
    let added=0;
    for(let file of input.files){
      try{
        this.alert('⏳ تحويل الصورة: '+file.name);
        const webpBlob=await window.convertImageToWebP(file);
        const url=URL.createObjectURL(webpBlob);
        
        const baseName=file.name.replace(/\.[^/.]+$/,'');
        const src=`assets/optimized/${baseName}.webp`;
        
        window.addPortfolioWork(src,cat,rating);
        added++;
        this.alert('✅ تمت إضافة: '+baseName);
      }catch(err){
        this.alert('❌ خطأ: '+err);
      }
    }
    
    if(added>0){
      this.alert(`✅ تمت إضافة ${added} صور بنجاح`);
      this.render();
    }
    
    input.value='';
  },

  resetToDefault(){
    if(!confirm('هل تريد حذف كل التعديلات؟'))return;
    localStorage.removeItem('fares-portfolio-manual-orders-v1');
    localStorage.removeItem('fares-portfolio-all-order-v1');
    localStorage.removeItem('fares-portfolio-deleted-works-v1');
    this.alert('✅ تم استعادة الترتيب الافتراضي');
    location.reload();
  }
};

// بدء التطبيق بعد تحميل الصفحة
document.addEventListener('DOMContentLoaded',()=>app.init());
// أو مباشرة إذا كانت الصفحة محملة بالفعل
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',()=>app.init());
}else{
  app.init();
}
</script></body></html>
